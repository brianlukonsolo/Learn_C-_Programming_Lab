<!DOCTYPE html>
<html lang="en" data-theme="nord">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C++ Academy — Learn C++ in a Day</title>
  <meta name="description" content="An interactive, themeable C++ course with a live in-browser compiler." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%99%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <button class="skip-link" id="skipLink">Skip to lesson content</button>

  <!-- Animated ambient background -->
  <div class="bg-aurora" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
    <div class="grid-overlay"></div>
  </div>

  <!-- Top navigation bar -->
  <header class="topbar">
    <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
    <div class="brand">
      <span class="brand-mark">C<sup>++</sup></span>
      <div class="brand-text">
        <strong>C++ Academy</strong>
        <small>Learn C++ in a day</small>
      </div>
    </div>

    <div class="topbar-progress" title="Course progress">
      <div class="ring" id="progressRing">
        <svg viewBox="0 0 44 44" aria-hidden="true">
          <circle class="ring-track" cx="22" cy="22" r="19"></circle>
          <circle class="ring-fill" id="ringFill" cx="22" cy="22" r="19"></circle>
        </svg>
        <span id="progressPct">0%</span>
      </div>
    </div>

    <div class="fs-pill" role="group" aria-label="Reading text size">
      <button id="fsDown" aria-label="Decrease text size" title="Smaller text">A<span class="fs-op">−</span></button>
      <span class="fs-sep" aria-hidden="true"></span>
      <button id="fsUp" aria-label="Increase text size" title="Larger text">A<span class="fs-op">+</span></button>
    </div>

    <div class="settings-switcher" id="settingsSwitcher">
      <button class="icon-btn" id="settingsBtn" aria-haspopup="true" aria-expanded="false" aria-label="Compiler settings" title="Compiler settings">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm0 6a2 2 0 1 1 0-4 2 2 0 0 1 0 4Zm8.4-2a6.7 6.7 0 0 0-.1-1l1.7-1.3-2-3.4-2 .8a7 7 0 0 0-1.7-1l-.3-2.1H9.9l-.3 2.1a7 7 0 0 0-1.7 1l-2-.8-2 3.4L5.7 11a6.7 6.7 0 0 0 0 2l-1.7 1.3 2 3.4 2-.8a7 7 0 0 0 1.7 1l.3 2.1h4.2l.3-2.1a7 7 0 0 0 1.7-1l2 .8 2-3.4-1.7-1.3c0-.3.1-.6.1-1Z"/></svg>
      </button>
      <div class="settings-menu" id="settingsMenu" role="menu">
        <div class="settings-row">
          <label for="stdSelect">C++ standard</label>
          <select id="stdSelect" class="settings-select">
            <option value="c++11">C++11</option>
            <option value="c++14">C++14</option>
            <option value="c++17">C++17</option>
            <option value="c++20">C++20</option>
            <option value="c++23">C++23</option>
          </select>
        </div>
        <label class="settings-toggle">
          <input type="checkbox" id="sanitizeToggle" />
          <span>AddressSanitizer</span>
          <small>Catches memory bugs &amp; undefined behaviour at runtime</small>
        </label>
      </div>
    </div>

    <div class="theme-switcher" id="themeSwitcher">
      <button class="icon-btn theme-btn" id="themeBtn" aria-haspopup="true" aria-expanded="false" aria-label="Change theme">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.5-.04-1-.12-1.47a.75.75 0 0 0-1.2-.47 3 3 0 0 1-4.24-4.24.75.75 0 0 0-.47-1.2C14.5 4.04 14 4 13.5 4 13 4 12.5 3.5 12 3Z"/></svg>
      </button>
      <div class="theme-menu" id="themeMenu" role="menu"></div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <input type="search" id="lessonSearch" class="search-input" placeholder="Search lessons…" aria-label="Search lessons" />
    </div>
    <nav class="lesson-nav" id="lessonNav" aria-label="Lessons"></nav>
    <div class="sidebar-foot">
      <button class="ghost-btn" id="resetProgress">Reset progress</button>
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <!-- Main content -->
  <main class="content" id="content">
    <article class="lesson" id="lesson" tabindex="-1"></article>

    <nav class="lesson-pager" id="lessonPager">
      <button class="pager-btn" id="prevBtn">
        <span class="pager-dir">‹ Previous</span><span class="pager-title" id="prevTitle"></span>
      </button>
      <button class="pager-btn done-btn" id="completeBtn">Mark complete &amp; continue</button>
      <button class="pager-btn next" id="nextBtn">
        <span class="pager-dir">Next ›</span><span class="pager-title" id="nextTitle"></span>
      </button>
    </nav>
  </main>

  <!-- Tooltip element (single, repositioned) -->
  <div class="tooltip-pop" id="tooltipPop" role="tooltip" aria-hidden="true"></div>

  <!-- Toast -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <!-- Confetti canvas -->
  <canvas class="confetti" id="confetti" aria-hidden="true"></canvas>

  <!-- Keyboard shortcuts (feature #5) -->
  <button class="help-fab" id="helpFab" aria-label="Keyboard shortcuts" title="Keyboard shortcuts (press ?)">?</button>
  <div class="modal-overlay" id="shortcutsModal" role="dialog" aria-modal="true" aria-labelledby="shortcutsTitle" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="shortcutsTitle">Keyboard shortcuts</h2>
        <button class="icon-btn" id="shortcutsClose" aria-label="Close">✕</button>
      </div>
      <ul class="shortcut-list">
        <li><span class="keys"><kbd>→</kbd></span> Next lesson</li>
        <li><span class="keys"><kbd>←</kbd></span> Previous lesson</li>
        <li><span class="keys"><kbd>Shift</kbd>+<kbd>Enter</kbd></span> Mark complete &amp; continue</li>
        <li><span class="keys"><kbd>/</kbd></span> Search lessons</li>
        <li><span class="keys"><kbd>Ctrl</kbd>/<kbd>⌘</kbd>+<kbd>Enter</kbd></span> Run code (inside an editor)</li>
        <li><span class="keys"><kbd>+</kbd> / <kbd>−</kbd></span> Larger / smaller text</li>
        <li><span class="keys"><kbd>?</kbd></span> Show this help</li>
        <li><span class="keys"><kbd>Esc</kbd></span> Close dialogs / menus</li>
      </ul>
    </div>
  </div>

  <script src="js/highlighter.js"></script>
  <script src="js/lessons.js"></script>
  <script src="js/runner.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
